<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Gen Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:       #060c10;
      --surface:  #0b1820;
      --raised:   #0f2232;
      --border:   #182d40;
      --accent:   #00cfb4;
      --amber:    #e8a020;
      --green:    #22c65e;
      --red:      #e85050;
      --blue:     #4d9de0;
      --text:     #c8dde8;
      --muted:    #5a7890;
      --dim:      #2e4555;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    textarea:focus {
      outline: none;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(0,207,180,0.1);
    }
    textarea { caret-color: var(--accent); }

    /* ── Radar spinner (signature element) ── */
    @keyframes radar-spin { to { transform: rotate(360deg); } }
    .radar-spinner {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-right-color: rgba(0,207,180,0.3);
      flex-shrink: 0;
      animation: radar-spin 0.85s linear infinite;
    }

    /* ── Message enter animation ── */
    @keyframes slide-up { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
    .msg-in { animation: slide-up 0.16s ease; }

    /* ── Interactive states ── */
    .chip { transition: border-color 0.14s, background 0.14s; }
    .chip:hover { border-color: var(--accent) !important; color: var(--text) !important; }
    .send-btn { transition: background 0.14s, opacity 0.14s; }
    .send-btn:hover:not(:disabled) { background: #00b8a2 !important; }
    .err-toggle:hover { color: var(--text) !important; }

    /* ── Table row hover ── */
    .result-row { transition: background 0.1s; }
    .result-row:hover td { background: var(--raised) !important; }
    .result-row:hover td:first-child { border-left: 2px solid var(--accent); padding-left: 9px; }

    /* ── Sidebar section labels ── */
    .sec-label {
      display: inline-block;
      border-left: 2px solid var(--accent);
      padding-left: 6px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    @media (prefers-reduced-motion: reduce) {
      .radar-spinner { animation: none; border-top-color: var(--accent); }
      .msg-in { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const BASE = window.location.origin;

    const STATUS_COLOR = {
      complete              : '#22c65e',
      no_results            : '#e8a020',
      awaiting_clarification: '#4d9de0',
      rejected              : '#e85050',
    };
    const STATUS_LABEL = {
      complete              : 'Complete',
      no_results            : 'No Results',
      awaiting_clarification: 'Clarification Needed',
      rejected              : 'Rejected',
    };
    const TOKEN_EST = {
      complete              : 16000,
      no_results            : 12000,
      awaiting_clarification: 1500,
      rejected              : 800,
    };

    function fmtTokens(n) { return n >= 1000 ? `${(n / 1000).toFixed(0)}K` : `${n}`; }
    function fmtTime(s) {
      if (s < 60) return `${s.toFixed(1)}s`;
      return `${Math.floor(s / 60)}m ${Math.floor(s % 60)}s`;
    }
    function fmtCountdown(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${h}h ${m}m`;
    }
    function guessType(q) {
      const lo = q.toLowerCase();
      const rejects = ['weather', 'poem', 'write me', 'recipe', 'what is', 'explain', 'tell me about', 'how to'];
      if (rejects.some(k => lo.includes(k))) return { label: 'Non-lead-gen', eta: '< 1s', tokens: 800 };
      if (lo.split(/\s+/).length <= 4) return { label: 'May clarify', eta: '~ 2s', tokens: 1500 };
      return { label: 'Full pipeline', eta: '~ 60s', tokens: 12000 };
    }

    // ── Crosshair icon (SVG) ──
    function Reticle({ size = 20, opacity = 1 }) {
      const r1 = size * 0.4, r2 = size * 0.22, dot = size * 0.1;
      const cx = size / 2, cy = size / 2;
      const tick = size * 0.14;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none" style={{ opacity, flexShrink: 0 }}>
          <circle cx={cx} cy={cy} r={r1} stroke="var(--accent)" strokeWidth={size * 0.06} strokeDasharray={`${size * 0.18} ${size * 0.12}`} />
          <circle cx={cx} cy={cy} r={r2} stroke="var(--accent)" strokeWidth={size * 0.04} opacity="0.35" />
          <circle cx={cx} cy={cy} r={dot} fill="var(--accent)" />
          <line x1={cx} y1={size * 0.02} x2={cx} y2={cy - r1 - size * 0.01} stroke="var(--accent)" strokeWidth={size * 0.06} />
          <line x1={cx} y1={cy + r1 + size * 0.01} x2={cx} y2={size * 0.98} stroke="var(--accent)" strokeWidth={size * 0.06} />
          <line x1={size * 0.02} y1={cy} x2={cx - r1 - size * 0.01} y2={cy} stroke="var(--accent)" strokeWidth={size * 0.06} />
          <line x1={cx + r1 + size * 0.01} y1={cy} x2={size * 0.98} y2={cy} stroke="var(--accent)" strokeWidth={size * 0.06} />
        </svg>
      );
    }

    // ── Status badge ──
    function Badge({ status }) {
      const color = STATUS_COLOR[status] || '#5a7890';
      return (
        <span style={{
          display: 'inline-block', padding: '2px 8px', borderRadius: 3,
          fontSize: 10, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase',
          background: color + '1e', color, border: `1px solid ${color}45`,
        }}>
          {STATUS_LABEL[status] || status}
        </span>
      );
    }

    // ── Results table ──
    function CompanyTable({ companies, contacts }) {
      const hasCompanies = companies && companies.length > 0;
      const hasContacts  = contacts  && contacts.length  > 0;
      if (!hasCompanies && !hasContacts) return null;

      const contactMap = {};
      (contacts || []).forEach(c => {
        const key = (c.company || '').toLowerCase().trim();
        if (!contactMap[key]) contactMap[key] = [];
        contactMap[key].push(c);
      });
      Object.values(contactMap).forEach(arr =>
        arr.sort((a, b) => (b.score || 0) - (a.score || 0))
      );

      const rows = (companies || []).map(co => ({
        co,
        contact: (contactMap[(co.name || '').toLowerCase().trim()] || [])[0] || null,
      }));

      const knownNames = new Set((companies || []).map(c => (c.name || '').toLowerCase().trim()));
      Object.entries(contactMap).forEach(([key, cts]) => {
        if (!knownNames.has(key)) {
          rows.push({ co: { name: cts[0].company || key, website: '', industry: '' }, contact: cts[0] });
        }
      });

      const COLS = ['#', 'Company', 'Industry', 'Website', 'Contact', 'Title', 'Email', 'Conf.'];
      const MONO = { fontFamily: "'JetBrains Mono', 'Cascadia Code', monospace" };

      return (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 600, letterSpacing: '0.08em', marginBottom: 8 }}>
            RESULTS — {rows.length} {rows.length === 1 ? 'COMPANY' : 'COMPANIES'}
          </div>
          <div style={{ overflowX: 'auto', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 700 }}>
              <thead>
                <tr style={{ background: 'var(--raised)' }}>
                  {COLS.map(h => (
                    <th key={h} style={{
                      textAlign: 'left', padding: '7px 10px', color: 'var(--muted)',
                      borderBottom: '1px solid var(--border)', fontWeight: 500,
                      whiteSpace: 'nowrap', fontSize: 10, letterSpacing: '0.05em',
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(({ co, contact }, i) => {
                  const conf  = contact?.confidence;
                  const verified = contact?.status === 'verified';
                  const emailColor = verified ? 'var(--accent)' : 'var(--amber)';
                  const confColor  = conf >= 70 ? '#22c65e' : conf >= 30 ? '#e8a020' : 'var(--muted)';
                  const site = (co.website || '').replace(/^https?:\/\/(www\.)?/, '');
                  return (
                    <tr key={i} className="result-row">
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', color: 'var(--dim)', ...MONO, fontSize: 11 }}>{i + 1}</td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', fontWeight: 600, whiteSpace: 'nowrap' }}>
                        {co.name || <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', color: 'var(--muted)', whiteSpace: 'nowrap', fontSize: 11 }}>
                        {co.industry || <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', ...MONO, fontSize: 11 }}>
                        {site
                          ? <a href={co.website} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--blue)', textDecoration: 'none' }}>{site}</a>
                          : <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', fontWeight: 500 }}>
                        {contact?.name || <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', color: 'var(--muted)', whiteSpace: 'nowrap', fontSize: 11 }}>
                        {contact?.title || <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', ...MONO, fontSize: 11 }}>
                        {contact?.email
                          ? <span style={{ color: emailColor }}>{contact.email}</span>
                          : <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                      <td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', ...MONO, fontSize: 11 }}>
                        {conf != null && conf > 0
                          ? <span style={{ color: confColor }}>{conf}%</span>
                          : <span style={{ color: 'var(--dim)' }}>—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── Agent message ──
    function AgentMsg({ msg }) {
      const [showErr, setShowErr] = useState(false);
      return (
        <div className="msg-in" style={{ display: 'flex', justifyContent: 'flex-start' }}>
          <div style={{
            maxWidth: '88%', background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: '2px 12px 12px 12px', padding: '14px 18px',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
              <Badge status={msg.status} />
              {msg.elapsed != null && (
                <span style={{ color: 'var(--muted)', fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                  {fmtTime(msg.elapsed)}
                </span>
              )}
              {msg.estimated_tokens > 0 && (
                <span style={{ color: 'var(--dim)', fontSize: 11 }}>~{fmtTokens(msg.estimated_tokens)} tok</span>
              )}
            </div>
            <div style={{ whiteSpace: 'pre-wrap', lineHeight: 1.65, fontSize: 13.5 }}>{msg.content}</div>
            <CompanyTable companies={msg.companies} contacts={msg.contacts} />
            {msg.errors && msg.errors.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <button className="err-toggle" onClick={() => setShowErr(v => !v)}
                  style={{ background: 'none', border: 'none', color: 'var(--muted)', fontSize: 11, cursor: 'pointer', padding: 0 }}>
                  {showErr ? '▲' : '▼'} {msg.errors.length} pipeline issue{msg.errors.length > 1 ? 's' : ''}
                </button>
                {showErr && (
                  <div style={{ marginTop: 6, background: 'var(--bg)', borderRadius: 4, padding: '8px 12px' }}>
                    {msg.errors.map((e, i) => (
                      <div key={i} style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.7, fontFamily: "'JetBrains Mono', monospace" }}>• {e}</div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── User message — teal left-border "transmission" style ──
    function UserMsg({ content }) {
      return (
        <div className="msg-in" style={{ display: 'flex', justifyContent: 'flex-end' }}>
          <div style={{
            maxWidth: '70%',
            background: 'rgba(0,207,180,0.07)',
            borderLeft: '2px solid var(--accent)',
            color: 'var(--text)',
            padding: '10px 14px 10px 16px',
            borderRadius: '0 10px 10px 0',
            fontSize: 14, lineHeight: 1.55,
          }}>
            {content}
          </div>
        </div>
      );
    }

    // ── Loading — radar spinner (signature) ──
    function LoadingMsg({ elapsed }) {
      const pct = Math.min(100, (elapsed / 90) * 100);
      return (
        <div className="msg-in" style={{ display: 'flex', justifyContent: 'flex-start' }}>
          <div style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: '2px 12px 12px 12px', padding: '16px 22px',
            display: 'flex', alignItems: 'center', gap: 18,
          }}>
            <div className="radar-spinner" />
            <div>
              <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)', marginBottom: 6, display: 'flex', alignItems: 'center', gap: 8 }}>
                Scanning signals
                <span style={{ fontFamily: "'JetBrains Mono', monospace", color: 'var(--accent)', fontSize: 12 }}>
                  {fmtTime(elapsed)}
                </span>
              </div>
              <div style={{ width: 150, height: 2, background: 'var(--border)', borderRadius: 1, overflow: 'hidden', marginBottom: 5 }}>
                <div style={{ height: '100%', background: 'var(--accent)', opacity: 0.65, width: `${pct}%`, transition: 'width 0.5s linear', borderRadius: 1 }} />
              </div>
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>agents running in parallel</div>
            </div>
          </div>
        </div>
      );
    }

    // ── API Credits widgets ──
    function KeyBadge({ hint, configured }) {
      const MONO = { fontFamily: "'JetBrains Mono', monospace" };
      if (!configured) return (
        <span style={{ padding: '1px 7px', borderRadius: 3, fontSize: 10, ...MONO, background: 'rgba(232,80,80,0.12)', color: '#e85050', border: '1px solid rgba(232,80,80,0.28)' }}>
          not set
        </span>
      );
      return (
        <span style={{ padding: '1px 7px', borderRadius: 3, fontSize: 10, ...MONO, background: 'rgba(0,207,180,0.1)', color: 'var(--accent)', border: '1px solid rgba(0,207,180,0.25)' }}>
          {hint}
        </span>
      );
    }

    function MiniBar({ pct }) {
      const color = pct > 80 ? '#e85050' : pct > 50 ? '#e8a020' : 'var(--accent)';
      return (
        <div style={{ height: 3, background: 'var(--border)', borderRadius: 2, overflow: 'hidden', marginTop: 4 }}>
          <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 2, transition: 'width 0.4s ease' }} />
        </div>
      );
    }

    function StatusDot({ active, label }) {
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, color: active ? 'var(--accent)' : '#e85050' }}>
          <span style={{ width: 5, height: 5, borderRadius: '50%', background: active ? 'var(--accent)' : '#e85050', display: 'inline-block' }} />
          {label}
        </span>
      );
    }

    function CredRow({ label, right }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
          <span style={{ fontSize: 11, color: 'var(--muted)' }}>{label}</span>
          {right}
        </div>
      );
    }

    function CreditsSection({ credits, lastRefreshed }) {
      const MONO = { fontFamily: "'JetBrains Mono', monospace" };
      if (!credits) return (
        <Section title="API CREDITS">
          <div style={{ fontSize: 11, color: 'var(--muted)' }}>Loading…</div>
        </Section>
      );

      const { groq = {}, hunter = {}, apollo = {} } = credits;
      const hunterUsed  = hunter.used      ?? 0;
      const hunterAvail = hunter.available ?? 50;
      const hunterPct   = Math.min(100, Math.round((hunterUsed / hunterAvail) * 100));
      const refreshLabel = lastRefreshed
        ? lastRefreshed.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';

      return (
        <Section title="API CREDITS" note={refreshLabel}>
          <CredRow label="Groq" right={<KeyBadge hint={groq.key_hint} configured={groq.configured} />} />
          <CredRow label="Queries this key" right={
            <span style={{ fontSize: 12, color: 'var(--text)', ...MONO }}>{groq.queries ?? 0}</span>
          } />
          {groq.errors > 0 && (
            <div style={{ marginTop: 4, fontSize: 11, color: '#e85050', background: 'rgba(232,80,80,0.08)', borderRadius: 3, padding: '3px 7px' }}>
              ⚠ {groq.errors} rate limit hit{groq.errors !== 1 ? 's' : ''}
            </div>
          )}

          <Divider />

          <CredRow label="Hunter" right={
            hunter.configured
              ? <span style={{ fontSize: 11, color: 'var(--text)', ...MONO }}>{hunterUsed}/{hunterAvail}</span>
              : <StatusDot active={false} label="not set" />
          } />
          {hunter.configured && (
            <>
              <MiniBar pct={hunterPct} />
              <div style={{ fontSize: 10, color: 'var(--dim)', marginTop: 3 }}>{hunterAvail - hunterUsed} remaining</div>
            </>
          )}

          <Divider />

          <CredRow label="Apollo" right={
            apollo.configured
              ? <StatusDot active={apollo.active} label={apollo.active ? 'active' : 'inactive'} />
              : <StatusDot active={false} label="not set" />
          } />
        </Section>
      );
    }

    // ── Sidebar ──
    function StatsPanel({ stats, lastMsg, nextEst, credits, creditsRefreshed }) {
      const [countdown, setCountdown] = useState('');

      useEffect(() => {
        const tick = () => {
          const now  = new Date();
          const next = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1));
          const diff = Math.max(0, Math.floor((next - now) / 1000));
          setCountdown(fmtCountdown(diff));
        };
        tick();
        const id = setInterval(tick, 30000);
        return () => clearInterval(id);
      }, []);

      const MONO = { fontFamily: "'JetBrains Mono', monospace" };
      const used  = stats?.estimated_tokens_today || 0;
      const limit = stats?.token_limit || 100_000;
      const pct   = Math.min(100, Math.round((used / limit) * 100));
      const barColor = pct > 90 ? '#e85050' : pct > 70 ? '#e8a020' : 'var(--accent)';
      const queriesLeft = Math.floor((limit - used) / 12_000);

      return (
        <aside style={{
          width: 252, background: 'var(--surface)', borderLeft: '1px solid var(--border)',
          overflowY: 'auto', padding: '16px 14px', flexShrink: 0, display: 'flex', flexDirection: 'column',
        }}>
          <CreditsSection credits={credits} lastRefreshed={creditsRefreshed} />

          <Section title="TOKEN USAGE">
            <div style={{ marginBottom: 6 }}>
              <span style={{ fontSize: 20, fontWeight: 700, color: 'var(--text)', ...MONO }}>{fmtTokens(used)}</span>
              <span style={{ color: 'var(--muted)', fontSize: 12 }}> / {fmtTokens(limit)}</span>
            </div>
            <div style={{ height: 4, background: 'var(--border)', borderRadius: 2, overflow: 'hidden', marginBottom: 6 }}>
              <div style={{ height: '100%', background: barColor, borderRadius: 2, width: `${pct}%`, transition: 'width 0.5s ease' }} />
            </div>
            <Row left={`${pct}% used`} right={`Resets ${countdown}`} />
          </Section>

          <Section title="QUERIES TODAY">
            <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--amber)', lineHeight: 1, marginBottom: 4, ...MONO }}>
              {stats?.queries_today || 0}
            </div>
            <div style={{ color: 'var(--muted)', fontSize: 11 }}>~{Math.max(0, queriesLeft)} full runs left</div>
          </Section>

          {lastMsg && (
            <Section title="LAST QUERY">
              <Row left="Status"><Badge status={lastMsg.status} /></Row>
              <Row left="Time" right={fmtTime(lastMsg.elapsed || 0)} />
              <Row left="Tokens" right={`~${fmtTokens(TOKEN_EST[lastMsg.status] || 8000)}`} />
            </Section>
          )}

          {nextEst && (
            <Section title="NEXT ESTIMATE">
              <Row left="Type" right={nextEst.label} />
              <Row left="ETA" right={nextEst.eta} highlight />
              <Row left="Tokens" right={`~${fmtTokens(nextEst.tokens)}`} />
            </Section>
          )}

          <Section title="MODELS" last>
            <ModelTag tag="llama-70b" color="#4d9de0" label="Parser · Scorer · Search" />
            <ModelTag tag="llama-8b"  color="#22c65e" label="Router · Title scoring" />
          </Section>
        </aside>
      );
    }

    function Section({ title, note, children, last }) {
      return (
        <div style={{ borderBottom: last ? 'none' : '1px solid var(--border)', paddingBottom: 14, marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <span className="sec-label">{title}</span>
            {note && <span style={{ fontSize: 10, color: 'var(--dim)' }}>{note}</span>}
          </div>
          {children}
        </div>
      );
    }

    function Divider() {
      return <div style={{ height: 1, background: 'var(--border)', margin: '10px 0' }} />;
    }

    function Row({ left, right, children, highlight }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
          <span style={{ color: 'var(--muted)', fontSize: 11 }}>{left}</span>
          {children || (
            <span style={{ fontSize: 11, color: highlight ? 'var(--accent)' : 'var(--text)', fontWeight: 500 }}>{right}</span>
          )}
        </div>
      );
    }

    function ModelTag({ tag, color, label }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5 }}>
          <span style={{
            background: color + '1a', color, padding: '1px 6px', borderRadius: 3,
            fontSize: 10, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace", flexShrink: 0,
          }}>{tag}</span>
          <span style={{ color: 'var(--muted)', fontSize: 11 }}>{label}</span>
        </div>
      );
    }

    // ── Example queries ──
    const EXAMPLES = [
      'Who is the CTO at Freshworks',
      'Find pharma companies in Hyderabad',
      'HR heads at logistics companies in Germany with 200+ employees',
      'Founders of SaaS startups in Bangalore using AWS',
    ];

    // ── App ──
    function App() {
      const [messages, setMessages]   = useState([]);
      const [query, setQuery]         = useState('');
      const [loading, setLoading]     = useState(false);
      const [elapsed, setElapsed]     = useState(0);
      const [serverUp, setServerUp]   = useState(false);
      const [stats, setStats]         = useState(null);
      const [lastMsg, setLastMsg]     = useState(null);
      const [nextEst, setNextEst]     = useState(null);
      const [credits, setCredits]     = useState(null);
      const [creditsRefreshed, setCreditsRefreshed] = useState(null);
      const bottomRef = useRef(null);
      const timerRef  = useRef(null);
      const startRef  = useRef(null);

      // Health check
      useEffect(() => {
        const check = async () => {
          try { setServerUp((await fetch(`${BASE}/health`)).ok); } catch { setServerUp(false); }
        };
        check();
        const id = setInterval(check, 30000);
        return () => clearInterval(id);
      }, []);

      // Stats polling
      const fetchStats = useCallback(async () => {
        try {
          const r = await fetch(`${BASE}/stats`);
          if (r.ok) setStats(await r.json());
        } catch {}
      }, []);

      useEffect(() => {
        fetchStats();
        const id = setInterval(fetchStats, 60000);
        return () => clearInterval(id);
      }, [fetchStats]);

      // Credits polling
      const fetchCredits = useCallback(async () => {
        try {
          const r = await fetch(`${BASE}/api/credits`);
          if (r.ok) { setCredits(await r.json()); setCreditsRefreshed(new Date()); }
        } catch {}
      }, []);

      useEffect(() => {
        fetchCredits();
        const id = setInterval(fetchCredits, 30000);
        return () => clearInterval(id);
      }, [fetchCredits]);

      // Scroll to bottom
      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      // Live query type estimate
      useEffect(() => {
        setNextEst(query.trim() ? guessType(query) : null);
      }, [query]);

      const handleSend = async () => {
        if (!query.trim() || loading) return;
        const q = query.trim();
        setQuery('');
        setMessages(prev => [...prev, { role: 'user', content: q }]);
        setLoading(true);
        setElapsed(0);
        startRef.current = Date.now();
        timerRef.current = setInterval(() => setElapsed((Date.now() - startRef.current) / 1000), 100);

        try {
          const res = await fetch(`${BASE}/chat`, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body   : JSON.stringify({ query: q }),
          });
          const data = await res.json();
          const el   = (Date.now() - startRef.current) / 1000;
          const msg  = {
            role            : 'assistant',
            content         : data.message,
            status          : data.status,
            contacts        : data.contacts   || [],
            companies       : data.companies  || [],
            errors          : data.errors     || [],
            elapsed         : data.elapsed_seconds || el,
            estimated_tokens: data.estimated_tokens || 0,
          };
          setMessages(prev => [...prev, msg]);
          setLastMsg(msg);
          fetchStats(); fetchCredits();
        } catch (err) {
          const el  = (Date.now() - startRef.current) / 1000;
          const msg = { role: 'assistant', content: 'Failed to connect to the server.', status: 'unknown', errors: [err.message], elapsed: el, estimated_tokens: 0 };
          setMessages(prev => [...prev, msg]);
          setLastMsg(msg);
        } finally {
          clearInterval(timerRef.current);
          setLoading(false);
        }
      };

      const onKey = e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>

          {/* ── Header ── */}
          <header style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '11px 20px', borderBottom: '1px solid var(--border)',
            background: 'var(--surface)', flexShrink: 0,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Reticle size={20} />
              <span style={{
                fontFamily: "'Space Grotesk', -apple-system, sans-serif",
                fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em', color: 'var(--text)',
              }}>
                Lead Gen Agent
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: serverUp ? 'var(--accent)' : 'var(--red)', display: 'inline-block' }} />
              <span style={{ color: 'var(--muted)', fontSize: 11 }}>{serverUp ? 'online' : 'offline'}</span>
            </div>
          </header>

          {/* ── Body ── */}
          <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>

            {/* Chat column */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

              {/* Messages */}
              <div style={{ flex: 1, overflowY: 'auto', padding: '24px 28px', display: 'flex', flexDirection: 'column', gap: 14 }}>

                {/* Empty state */}
                {messages.length === 0 && (
                  <div style={{
                    display: 'flex', flexDirection: 'column', alignItems: 'center',
                    justifyContent: 'center', flex: 1, textAlign: 'center', padding: 48, gap: 10,
                  }}>
                    <Reticle size={52} opacity={0.55} />
                    <div style={{
                      fontFamily: "'Space Grotesk', -apple-system, sans-serif",
                      fontSize: 22, fontWeight: 600, color: 'var(--text)',
                      letterSpacing: '-0.02em', marginTop: 6,
                    }}>
                      Lead Gen Agent
                    </div>
                    <div style={{ fontSize: 13, color: 'var(--muted)', maxWidth: 340, lineHeight: 1.65 }}>
                      Find decision makers at any company.{' '}
                      <span style={{ color: 'var(--accent)' }}>Role is optional</span>
                      {' '}— defaults to Founder / CEO / MD.
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginTop: 14, width: '100%', maxWidth: 400 }}>
                      {EXAMPLES.map((ex, i) => (
                        <div key={i} className="chip" onClick={() => setQuery(ex)}
                          style={{
                            background: 'var(--surface)', border: '1px solid var(--border)',
                            borderRadius: 7, padding: '9px 14px', fontSize: 13,
                            cursor: 'pointer', textAlign: 'left', color: 'var(--muted)',
                            display: 'flex', alignItems: 'center', gap: 10,
                          }}>
                          <span style={{ color: 'var(--accent)', fontFamily: "'JetBrains Mono', monospace", fontSize: 13, flexShrink: 0 }}>›</span>
                          {ex}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {messages.map((m, i) =>
                  m.role === 'user'
                    ? <UserMsg key={i} content={m.content} />
                    : <AgentMsg key={i} msg={m} />
                )}
                {loading && <LoadingMsg elapsed={elapsed} />}
                <div ref={bottomRef} />
              </div>

              {/* Input bar */}
              <div style={{
                padding: '12px 20px 14px', borderTop: '1px solid var(--border)',
                background: 'var(--bg)', flexShrink: 0,
                display: 'flex', gap: 10, alignItems: 'flex-end',
              }}>
                <textarea
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  onKeyDown={onKey}
                  disabled={loading}
                  placeholder="e.g. Find pharma companies in Hyderabad  ·  Who is the CTO at Freshworks"
                  rows={2}
                  style={{
                    flex: 1, background: 'var(--surface)', border: '1px solid var(--border)',
                    borderRadius: 8, color: 'var(--text)', padding: '10px 14px',
                    fontSize: 13.5, resize: 'none', fontFamily: 'inherit', lineHeight: 1.5,
                  }}
                />
                <button
                  className="send-btn"
                  onClick={handleSend}
                  disabled={!query.trim() || loading}
                  style={{
                    background: 'var(--accent)', color: '#060c10', border: 'none',
                    borderRadius: 8, padding: '0 22px', height: 54, fontSize: 13,
                    fontWeight: 700, cursor: 'pointer', flexShrink: 0,
                    opacity: (!query.trim() || loading) ? 0.3 : 1,
                    fontFamily: "'Space Grotesk', sans-serif", letterSpacing: '0.02em',
                  }}
                >
                  {loading ? '…' : 'Send'}
                </button>
              </div>
            </div>

            {/* Sidebar */}
            <StatsPanel stats={stats} lastMsg={lastMsg} nextEst={nextEst}
              credits={credits} creditsRefreshed={creditsRefreshed} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
