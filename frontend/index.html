<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Gen Agent</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CDN — preflight disabled so it doesn't conflict with existing base CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    textarea:focus { outline: none; border-color: #58a6ff !important; }
    textarea { caret-color: #58a6ff; }
    .example-chip:hover { border-color: #58a6ff !important; color: #c9d1d9 !important; }
    .send-btn:hover:not(:disabled) { background: #2ea043 !important; }
    .err-toggle:hover { color: #c9d1d9 !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const BASE = window.location.origin;

    const STATUS_COLOR = {
      complete              : '#3fb950',
      no_results            : '#d29922',
      awaiting_clarification: '#58a6ff',
      rejected              : '#f85149',
    };
    const STATUS_LABEL = {
      complete              : 'Complete',
      no_results            : 'No Results',
      awaiting_clarification: 'Clarification Needed',
      rejected              : 'Rejected',
    };
    const TOKEN_EST = {
      complete              : 16000,
      no_results            : 12000,
      awaiting_clarification: 1500,
      rejected              : 800,
    };

    function fmtTokens(n) { return n >= 1000 ? `${(n / 1000).toFixed(0)}K` : `${n}`; }
    function fmtTime(s) {
      if (s < 60) return `${s.toFixed(1)}s`;
      return `${Math.floor(s / 60)}m ${Math.floor(s % 60)}s`;
    }
    function fmtCountdown(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${h}h ${m}m`;
    }

    function guessType(q) {
      const lo = q.toLowerCase();
      const rejects = ['weather', 'poem', 'write me', 'recipe', 'what is', 'explain', 'tell me about', 'how to'];
      if (rejects.some(k => lo.includes(k))) return { label: 'Non-lead-gen', eta: '< 1s', tokens: 800 };
      if (lo.split(/\s+/).length <= 4) return { label: 'May clarify', eta: '~ 2s', tokens: 1500 };
      return { label: 'Full pipeline', eta: '~ 60s', tokens: 12000 };
    }

    // ----- small components -----

    function Badge({ status }) {
      const color = STATUS_COLOR[status] || '#8b949e';
      return (
        <span style={{
          display: 'inline-block', padding: '2px 8px', borderRadius: 4,
          fontSize: 11, fontWeight: 600, letterSpacing: '0.03em',
          background: color + '22', color, border: `1px solid ${color}44`,
        }}>
          {STATUS_LABEL[status] || status}
        </span>
      );
    }

    function CompanyTable({ companies, contacts }) {
      const hasCompanies = companies && companies.length > 0;
      const hasContacts  = contacts  && contacts.length  > 0;
      if (!hasCompanies && !hasContacts) return null;

      // Build contact map: company name (lowercase) → contacts sorted by score desc
      const contactMap = {};
      (contacts || []).forEach(c => {
        const key = (c.company || '').toLowerCase().trim();
        if (!contactMap[key]) contactMap[key] = [];
        contactMap[key].push(c);
      });
      Object.values(contactMap).forEach(arr =>
        arr.sort((a, b) => (b.score || 0) - (a.score || 0))
      );

      // One row per discovered company
      const rows = (companies || []).map(co => ({
        co,
        contact: (contactMap[(co.name || '').toLowerCase().trim()] || [])[0] || null,
      }));

      // Add contacts whose company didn't appear in the companies list (edge case)
      const knownNames = new Set((companies || []).map(c => (c.name || '').toLowerCase().trim()));
      Object.entries(contactMap).forEach(([key, cts]) => {
        if (!knownNames.has(key)) {
          rows.push({ co: { name: cts[0].company || key, website: '', industry: '' }, contact: cts[0] });
        }
      });

      const COLS = ['#', 'Company', 'Industry', 'Website', 'Contact Name', 'Title', 'Email', 'Confidence'];

      return (
        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, color: '#8b949e', fontWeight: 600, letterSpacing: '0.06em', marginBottom: 8 }}>
            RESULTS — {rows.length} COMPAN{rows.length === 1 ? 'Y' : 'IES'}
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, minWidth: 680 }}>
              <thead>
                <tr>
                  {COLS.map(h => (
                    <th key={h} style={{
                      textAlign: 'left', padding: '5px 8px', color: '#8b949e',
                      borderBottom: '1px solid #30363d', fontWeight: 500, whiteSpace: 'nowrap',
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(({ co, contact }, i) => {
                  const conf   = contact?.confidence;
                  const status = contact?.status;
                  const emailColor = status === 'verified' ? '#3fb950' : '#d29922';
                  const confColor  = conf >= 70 ? '#3fb950' : conf >= 30 ? '#d29922' : '#8b949e';
                  const site = (co.website || '').replace(/^https?:\/\/(www\.)?/, '');
                  return (
                    <tr key={i} style={{ background: i % 2 ? '#ffffff06' : 'transparent' }}>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', color: '#8b949e' }}>{i + 1}</td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', fontWeight: 500, whiteSpace: 'nowrap' }}>
                        {co.name || '—'}
                      </td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', color: '#8b949e' }}>
                        {co.industry || '—'}
                      </td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', fontFamily: 'monospace', fontSize: 11 }}>
                        {site ? (
                          <a href={co.website} target="_blank" rel="noopener noreferrer"
                            style={{ color: '#58a6ff', textDecoration: 'none' }}>{site}</a>
                        ) : '—'}
                      </td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d' }}>{contact?.name || '—'}</td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', color: '#8b949e' }}>{contact?.title || '—'}</td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d', fontFamily: 'monospace', fontSize: 11 }}>
                        {contact?.email
                          ? <span style={{ color: emailColor }}>{contact.email}</span>
                          : '—'}
                      </td>
                      <td style={{ padding: '6px 8px', borderBottom: '1px solid #21262d' }}>
                        {conf != null && conf > 0
                          ? <span style={{ color: confColor }}>{conf}%</span>
                          : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function AgentMsg({ msg }) {
      const [showErr, setShowErr] = useState(false);
      return (
        <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
          <div style={{
            maxWidth: '85%', background: '#161b22', border: '1px solid #30363d',
            borderRadius: '2px 12px 12px 12px', padding: '12px 16px', fontSize: 14,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
              <Badge status={msg.status} />
              {msg.elapsed != null && (
                <span style={{ color: '#8b949e', fontSize: 12 }}>{fmtTime(msg.elapsed)}</span>
              )}
              {msg.estimated_tokens > 0 && (
                <span style={{ color: '#8b949e', fontSize: 12 }}>~{fmtTokens(msg.estimated_tokens)} tokens</span>
              )}
            </div>
            <div style={{ whiteSpace: 'pre-wrap', lineHeight: 1.6 }}>{msg.content}</div>
            <CompanyTable companies={msg.companies} contacts={msg.contacts} />
            {msg.errors && msg.errors.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <button className="err-toggle" onClick={() => setShowErr(v => !v)}
                  style={{ background: 'none', border: 'none', color: '#8b949e', fontSize: 12, cursor: 'pointer', padding: 0 }}>
                  {showErr ? '▲' : '▼'} {msg.errors.length} pipeline issue{msg.errors.length > 1 ? 's' : ''}
                </button>
                {showErr && (
                  <div style={{ marginTop: 6, background: '#0d1117', borderRadius: 4, padding: '6px 10px' }}>
                    {msg.errors.map((e, i) => (
                      <div key={i} style={{ fontSize: 11, color: '#8b949e', lineHeight: 1.7 }}>• {e}</div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    function UserMsg({ content }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
          <div style={{
            maxWidth: '70%', background: '#1f4068', color: '#c9d1d9',
            padding: '10px 14px', borderRadius: '12px 12px 2px 12px',
            fontSize: 14, lineHeight: 1.5,
          }}>
            {content}
          </div>
        </div>
      );
    }

    function LoadingMsg({ elapsed }) {
      const dots = '.'.repeat((Math.floor(elapsed) % 3) + 1);
      const pct = Math.min(100, (elapsed / 90) * 100);
      return (
        <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
          <div style={{
            background: '#161b22', border: '1px solid #30363d',
            borderRadius: '2px 12px 12px 12px', padding: '12px 16px',
            fontSize: 14, minWidth: 200, opacity: 0.8,
          }}>
            <div style={{ color: '#8b949e', marginBottom: 8 }}>
              Searching{dots} <span style={{ color: '#58a6ff' }}>{fmtTime(elapsed)}</span>
            </div>
            <div style={{ height: 4, background: '#21262d', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{
                height: '100%', background: '#58a6ff', borderRadius: 2,
                width: `${pct}%`, transition: 'width 0.5s linear',
              }} />
            </div>
          </div>
        </div>
      );
    }

    // ----- API Credits section -----

    function KeyBadge({ hint, configured }) {
      if (!configured) return (
        <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-mono"
          style={{ background: '#f8514922', color: '#f85149', border: '1px solid #f8514944' }}>
          not set
        </span>
      );
      return (
        <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-mono"
          style={{ background: '#3fb95018', color: '#3fb950', border: '1px solid #3fb95033' }}>
          {hint}
        </span>
      );
    }

    function MiniBar({ pct, warn }) {
      const color = pct > 80 ? '#f85149' : pct > 50 ? '#d29922' : '#3fb950';
      return (
        <div className="w-full rounded-full overflow-hidden" style={{ height: 3, background: '#21262d' }}>
          <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 2, transition: 'width 0.4s ease' }} />
        </div>
      );
    }

    function StatusDot({ active, label }) {
      return (
        <span className="inline-flex items-center gap-1 text-xs"
          style={{ color: active ? '#3fb950' : '#f85149' }}>
          <span style={{
            display: 'inline-block', width: 6, height: 6, borderRadius: '50%',
            background: active ? '#3fb950' : '#f85149',
          }} />
          {label}
        </span>
      );
    }

    function CreditsSection({ credits, lastRefreshed }) {
      if (!credits) return (
        <div className="pb-3 mb-3" style={{ borderBottom: '1px solid #21262d' }}>
          <div style={{ fontSize: 10, letterSpacing: '0.08em', color: '#8b949e', fontWeight: 600, marginBottom: 10 }}>
            API CREDITS
          </div>
          <div style={{ fontSize: 11, color: '#8b949e' }}>Loading…</div>
        </div>
      );

      const { groq = {}, hunter = {}, apollo = {} } = credits;
      const hunterUsed  = hunter.used      ?? 0;
      const hunterAvail = hunter.available ?? 50;
      const hunterPct   = Math.min(100, Math.round((hunterUsed / hunterAvail) * 100));
      const refreshLabel = lastRefreshed
        ? `Updated ${lastRefreshed.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
        : '';

      return (
        <div className="pb-3 mb-3" style={{ borderBottom: '1px solid #21262d' }}>
          {/* Section header */}
          <div className="flex items-center justify-between mb-2">
            <span style={{ fontSize: 10, letterSpacing: '0.08em', color: '#8b949e', fontWeight: 600 }}>
              API CREDITS
            </span>
            {refreshLabel && (
              <span style={{ fontSize: 10, color: '#484f58' }}>{refreshLabel}</span>
            )}
          </div>

          {/* ── Groq ── */}
          <div className="mb-3">
            <div className="flex items-center justify-between mb-1">
              <span style={{ fontSize: 11, color: '#8b949e', fontWeight: 500 }}>Groq</span>
              <KeyBadge hint={groq.key_hint} configured={groq.configured} />
            </div>
            <div className="flex justify-between items-center">
              <span style={{ fontSize: 11, color: '#8b949e' }}>Queries this key</span>
              <span style={{ fontSize: 11, color: '#c9d1d9', fontWeight: 600 }}>{groq.queries ?? 0}</span>
            </div>
            {groq.errors > 0 && (
              <div className="flex items-center gap-1 mt-1"
                style={{ fontSize: 11, color: '#f85149', background: '#f8514910', borderRadius: 4, padding: '3px 6px' }}>
                <span>⚠</span>
                <span>{groq.errors} rate limit hit{groq.errors !== 1 ? 's' : ''}</span>
              </div>
            )}
          </div>

          {/* ── Hunter ── */}
          <div className="mb-3">
            <div className="flex items-center justify-between mb-1">
              <span style={{ fontSize: 11, color: '#8b949e', fontWeight: 500 }}>Hunter</span>
              {hunter.configured
                ? <span style={{ fontSize: 11, color: '#c9d1d9' }}>{hunterUsed} / {hunterAvail}</span>
                : <StatusDot active={false} label="not set" />}
            </div>
            {hunter.configured && (
              <>
                <MiniBar pct={hunterPct} />
                <div style={{ fontSize: 10, color: '#484f58', marginTop: 3 }}>
                  {hunterAvail - hunterUsed} searches remaining
                </div>
              </>
            )}
          </div>

          {/* ── Apollo ── */}
          <div>
            <div className="flex items-center justify-between">
              <span style={{ fontSize: 11, color: '#8b949e', fontWeight: 500 }}>Apollo</span>
              {apollo.configured
                ? <StatusDot active={apollo.active} label={apollo.active ? 'active' : 'inactive'} />
                : <StatusDot active={false} label="not set" />}
            </div>
          </div>
        </div>
      );
    }

    // ----- Stats sidebar -----

    function StatsPanel({ stats, lastMsg, nextEst, credits, creditsRefreshed }) {
      const [countdown, setCountdown] = useState('');

      useEffect(() => {
        const tick = () => {
          const now = new Date();
          const next = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1));
          const diff = Math.max(0, Math.floor((next - now) / 1000));
          setCountdown(fmtCountdown(diff));
        };
        tick();
        const id = setInterval(tick, 30000);
        return () => clearInterval(id);
      }, []);

      const used  = stats?.estimated_tokens_today || 0;
      const limit = stats?.token_limit || 100_000;
      const pct   = Math.min(100, Math.round((used / limit) * 100));
      const barColor = pct > 90 ? '#f85149' : pct > 70 ? '#d29922' : '#3fb950';
      const queriesLeft = Math.floor((limit - used) / 12_000);

      return (
        <aside style={{
          width: 260, background: '#0d1117', borderLeft: '1px solid #30363d',
          overflowY: 'auto', padding: '16px 14px', flexShrink: 0,
          display: 'flex', flexDirection: 'column', gap: 0,
        }}>
          {/* API Credits */}
          <CreditsSection credits={credits} lastRefreshed={creditsRefreshed} />

          {/* Token usage */}
          <Section title="TOKEN USAGE — TODAY">
            <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 6 }}>
              <span style={{ color: '#c9d1d9' }}>{fmtTokens(used)}</span>
              <span style={{ color: '#8b949e', fontSize: 14 }}> / {fmtTokens(limit)}</span>
            </div>
            <div style={{ height: 6, background: '#21262d', borderRadius: 3, overflow: 'hidden', marginBottom: 6 }}>
              <div style={{ height: '100%', background: barColor, borderRadius: 3, width: `${pct}%`, transition: 'width 0.5s ease' }} />
            </div>
            <Row left={`${pct}% used`} right={`Resets in ${countdown}`} />
          </Section>

          {/* Queries */}
          <Section title="QUERIES TODAY">
            <div style={{ fontSize: 30, fontWeight: 700, color: '#58a6ff', lineHeight: 1, marginBottom: 4 }}>
              {stats?.queries_today || 0}
            </div>
            <div style={{ color: '#8b949e', fontSize: 12 }}>
              ~{Math.max(0, queriesLeft)} full-pipeline queries left
            </div>
          </Section>

          {/* Last query */}
          {lastMsg && (
            <Section title="LAST QUERY">
              <Row left="Status">
                <Badge status={lastMsg.status} />
              </Row>
              <Row left="Time taken" right={fmtTime(lastMsg.elapsed || 0)} />
              <Row left="Est. tokens" right={`~${fmtTokens(TOKEN_EST[lastMsg.status] || 8000)}`} />
            </Section>
          )}

          {/* Next estimate */}
          {nextEst && (
            <Section title="NEXT QUERY ESTIMATE">
              <Row left="Type" right={nextEst.label} />
              <Row left="Est. time" right={nextEst.eta} highlight />
              <Row left="Est. tokens" right={`~${fmtTokens(nextEst.tokens)}`} />
            </Section>
          )}

          {/* Models */}
          <Section title="MODELS" last>
            <ModelRow tag="70b" color="#58a6ff" bg="#1a2a4a" label="Query parse · Lead score · Search" />
            <ModelRow tag="8b" color="#3fb950" bg="#1a3a2a" label="Industry · Title scoring · Routing" />
          </Section>
        </aside>
      );
    }

    function Section({ title, children, last }) {
      return (
        <div style={{ borderBottom: last ? 'none' : '1px solid #21262d', paddingBottom: 14, marginBottom: 14 }}>
          <div style={{ fontSize: 10, letterSpacing: '0.08em', color: '#8b949e', fontWeight: 600, marginBottom: 10 }}>
            {title}
          </div>
          {children}
        </div>
      );
    }

    function Row({ left, right, children, highlight }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
          <span style={{ color: '#8b949e', fontSize: 12 }}>{left}</span>
          {children || (
            <span style={{ fontSize: 12, color: highlight ? '#58a6ff' : '#c9d1d9', fontWeight: 500 }}>{right}</span>
          )}
        </div>
      );
    }

    function ModelRow({ tag, color, bg, label }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
          <span style={{ background: bg, color, padding: '2px 6px', borderRadius: 4, fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
            {tag}
          </span>
          <span style={{ color: '#8b949e', fontSize: 11 }}>{label}</span>
        </div>
      );
    }

    // ----- Main App -----

    const EXAMPLES = [
      'Find CTOs at Series B SaaS companies in the US that use React',
      'VP Engineering contacts at UK fintech startups with 50-200 employees',
      'Founders of AI startups that raised Series A in 2024',
    ];

    function App() {
      const [messages, setMessages]         = useState([]);
      const [query, setQuery]               = useState('');
      const [loading, setLoading]           = useState(false);
      const [elapsed, setElapsed]           = useState(0);
      const [serverUp, setServerUp]         = useState(false);
      const [stats, setStats]               = useState(null);
      const [lastMsg, setLastMsg]           = useState(null);
      const [nextEst, setNextEst]           = useState(null);
      const [credits, setCredits]           = useState(null);
      const [creditsRefreshed, setCreditsRefreshed] = useState(null);
      const bottomRef  = useRef(null);
      const timerRef   = useRef(null);
      const startRef   = useRef(null);

      // Health check
      useEffect(() => {
        const check = async () => {
          try { setServerUp((await fetch(`${BASE}/health`)).ok); } catch { setServerUp(false); }
        };
        check();
        const id = setInterval(check, 30000);
        return () => clearInterval(id);
      }, []);

      // Stats polling
      const fetchStats = useCallback(async () => {
        try {
          const r = await fetch(`${BASE}/stats`);
          if (r.ok) setStats(await r.json());
        } catch {}
      }, []);

      useEffect(() => {
        fetchStats();
        const id = setInterval(fetchStats, 60000);
        return () => clearInterval(id);
      }, [fetchStats]);

      // Credits polling — every 30 s; also called after each chat response
      const fetchCredits = useCallback(async () => {
        try {
          const r = await fetch(`${BASE}/api/credits`);
          if (r.ok) {
            setCredits(await r.json());
            setCreditsRefreshed(new Date());
          }
        } catch {}
      }, []);

      useEffect(() => {
        fetchCredits();
        const id = setInterval(fetchCredits, 30000);
        return () => clearInterval(id);
      }, [fetchCredits]);

      // Scroll to bottom
      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      // Live next-query estimate as user types
      useEffect(() => {
        setNextEst(query.trim() ? guessType(query) : null);
      }, [query]);

      const handleSend = async () => {
        if (!query.trim() || loading) return;
        const q = query.trim();
        setQuery('');
        setMessages(prev => [...prev, { role: 'user', content: q }]);
        setLoading(true);
        setElapsed(0);
        startRef.current = Date.now();
        timerRef.current = setInterval(() => {
          setElapsed((Date.now() - startRef.current) / 1000);
        }, 100);

        try {
          const res = await fetch(`${BASE}/chat`, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body   : JSON.stringify({ query: q }),
          });
          const data = await res.json();
          const el   = (Date.now() - startRef.current) / 1000;
          const msg  = {
            role            : 'assistant',
            content         : data.message,
            status          : data.status,
            contacts        : data.contacts  || [],
            companies       : data.companies || [],
            errors          : data.errors    || [],
            elapsed         : data.elapsed_seconds || el,
            estimated_tokens: data.estimated_tokens || 0,
          };
          setMessages(prev => [...prev, msg]);
          setLastMsg(msg);
          fetchStats();
          fetchCredits();
        } catch (err) {
          const el = (Date.now() - startRef.current) / 1000;
          const msg = {
            role: 'assistant', content: 'Failed to connect to the server.',
            status: 'unknown', errors: [err.message], elapsed: el, estimated_tokens: 0,
          };
          setMessages(prev => [...prev, msg]);
          setLastMsg(msg);
        } finally {
          clearInterval(timerRef.current);
          setLoading(false);
        }
      };

      const onKey = e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
          {/* Header */}
          <header style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '12px 20px', borderBottom: '1px solid #30363d', background: '#161b22', flexShrink: 0,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 16, fontWeight: 600 }}>
              <span style={{ color: '#58a6ff', fontSize: 20 }}>◉</span>
              Lead Gen Agent
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{
                width: 8, height: 8, borderRadius: '50%', display: 'inline-block',
                background: serverUp ? '#3fb950' : '#f85149',
              }} />
              <span style={{ color: '#8b949e', fontSize: 12 }}>
                {serverUp ? 'Server online' : 'Server offline'}
              </span>
            </div>
          </header>

          {/* Body */}
          <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
            {/* Chat column */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              {/* Messages */}
              <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
                {messages.length === 0 && (
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flex: 1, gap: 8, color: '#8b949e', textAlign: 'center', padding: 40 }}>
                    <div style={{ fontSize: 40, color: '#30363d', marginBottom: 4 }}>◉</div>
                    <div style={{ fontSize: 18, fontWeight: 600, color: '#c9d1d9' }}>Lead Gen Agent</div>
                    <div style={{ fontSize: 13 }}>Find B2B decision makers at any company. Try:</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 8, width: '100%', maxWidth: 420 }}>
                      {EXAMPLES.map((ex, i) => (
                        <div key={i} className="example-chip"
                          onClick={() => setQuery(ex)}
                          style={{
                            background: '#161b22', border: '1px solid #30363d',
                            borderRadius: 8, padding: '9px 14px', fontSize: 13,
                            cursor: 'pointer', textAlign: 'left', color: '#8b949e',
                          }}>
                          {ex}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {messages.map((m, i) =>
                  m.role === 'user'
                    ? <UserMsg key={i} content={m.content} />
                    : <AgentMsg key={i} msg={m} />
                )}
                {loading && <LoadingMsg elapsed={elapsed} />}
                <div ref={bottomRef} />
              </div>

              {/* Input bar */}
              <div style={{
                display: 'flex', gap: 10, padding: '14px 24px',
                borderTop: '1px solid #30363d', background: '#0d1117', flexShrink: 0,
              }}>
                <textarea
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  onKeyDown={onKey}
                  disabled={loading}
                  placeholder="Find CTOs at fintech startups in Germany..."
                  rows={2}
                  style={{
                    flex: 1, background: '#161b22', border: '1px solid #30363d',
                    borderRadius: 8, color: '#c9d1d9', padding: '10px 14px',
                    fontSize: 14, resize: 'none', fontFamily: 'inherit',
                  }}
                />
                <button
                  className="send-btn"
                  onClick={handleSend}
                  disabled={!query.trim() || loading}
                  style={{
                    background: '#238636', color: '#fff', border: 'none',
                    borderRadius: 8, padding: '0 20px', fontSize: 14,
                    fontWeight: 600, cursor: 'pointer', flexShrink: 0,
                    opacity: (!query.trim() || loading) ? 0.45 : 1,
                  }}
                >
                  {loading ? '…' : 'Send'}
                </button>
              </div>
            </div>

            {/* Stats sidebar */}
            <StatsPanel stats={stats} lastMsg={lastMsg} nextEst={nextEst}
              credits={credits} creditsRefreshed={creditsRefreshed} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
